management:
  info:
    java:
      enabled: true
    os:
      enabled: true
    env:
      enabled: true

#  server:
#    port: 9292

  server:
    port: 8080

  endpoint:
    shutdown:
      enabled: true # 엔드 포인트 활성화

    health:
      show-details: always

  endpoints:
    web:
      exposure:
        include: "*" # 엔드 포인트 노출

info:
  app:
    name: hello-actuator
    company: yh

logging:
  level:
    hello.controller: debug

server:
  tomcat:
    mbeanregistry:
      enabled: true # 많이 사용함

